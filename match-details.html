<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Details & Intelligence</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .details-page { 
      max-width: 900px; 
      margin: 0 auto; 
      padding: 40px 24px; 
    }
    .back-btn { 
      background: #1C1C1E; 
      color: #FFF; 
      border: none; 
      padding: 10px 20px; 
      border-radius: 12px; 
      cursor: pointer; 
      text-decoration: none; 
      font-weight: 600; 
      font-size: 14px;
      display: inline-block; 
      margin-bottom: 24px; 
      transition: background 0.2s;
    }
    .back-btn:hover { background: #2C2C2E; }
    
    .bento-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 20px; 
      margin-top: 20px; 
    }
    
    .bento-card { 
      background: rgba(28,28,30,0.65); 
      border: 1px solid rgba(255,255,255,0.08); 
      border-radius: 24px; 
      padding: 24px; 
      backdrop-filter: blur(40px) saturate(200%); 
      -webkit-backdrop-filter: blur(40px) saturate(200%);
    }
    
    .bento-title { 
      color: #8E8E93; 
      text-transform: uppercase; 
      font-size: 11px; 
      font-weight: 600; 
      letter-spacing: 0.5px; 
      margin-bottom: 16px; 
    }
    
    .venue-name { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #FFF; }
    .avg-score { font-size: 42px; font-weight: 300; color: #0A84FF; letter-spacing: -1px; margin-bottom: 10px; }
    
    .pitch-badge { 
      display: inline-block; 
      padding: 6px 12px; 
      border-radius: 8px; 
      font-size: 12px; 
      font-weight: 600; 
      margin-right: 8px; 
      margin-top: 8px; 
      background: rgba(255,255,255,0.05); 
      color: #FFF;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .pace { color: #30D158; border-color: rgba(48, 209, 88, 0.3); background: rgba(48, 209, 88, 0.1); }
    .spin { color: #0A84FF; border-color: rgba(10, 132, 255, 0.3); background: rgba(10, 132, 255, 0.1); }
    
    .team-header { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: #FFF; }
    .team-list { list-style: none; padding: 0; margin: 0; }
    .team-list li { 
      padding: 10px 0; 
      border-bottom: 1px solid rgba(255,255,255,0.05); 
      font-size: 15px; 
      color: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
    }
    .team-list li::before {
      content: '';
      width: 6px;
      height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      margin-right: 12px;
      display: inline-block;
    }
    .team-list li:last-child { border: none; }
    
    @media(max-width: 768px) {
      .bento-grid { grid-template-columns: 1fr; }
      .details-page { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <div class="details-page">
    <a href="index.html" class="back-btn">← Back to Dashboard</a>
    <h1 id="matchTitle" style="font-size: 32px; font-weight: 700; margin-bottom: 5px;">Loading Intelligence...</h1>
    <p id="matchDate" style="color: #8E8E93; font-size: 15px; font-weight: 500; margin-bottom: 30px;">...</p>
    
    <div class="bento-grid">
      <!-- Venue Widget -->
      <div class="bento-card" style="grid-column: 1 / -1;">
        <div class="bento-title">Ground Intelligence</div>
        <div class="venue-name" id="venueName">Stadium Data Loading</div>
        <div style="font-size: 13px; color: #8E8E93; margin-top: 16px; margin-bottom: 4px; font-weight: 600;">AVERAGE 1ST INNINGS</div>
        <div class="avg-score" id="venueAvg">0</div>
        <div id="pitchBadges"></div>
      </div>
      
      <!-- Squad Widgets -->
      <div class="bento-card">
        <div class="bento-title">Predicted Playing XI</div>
        <div class="team-header" id="team1Name">Team 1</div>
        <ul class="team-list" id="team1List"></ul>
      </div>
      
      <div class="bento-card">
        <div class="bento-title">Predicted Playing XI</div>
        <div class="team-header" id="team2Name">Team 2</div>
        <ul class="team-list" id="team2List"></ul>
      </div>
      
      <!-- History Widget -->
      <div class="bento-card" style="grid-column: 1 / -1;">
        <div class="bento-title">Form & 2025 Venue Performers</div>
        <ul class="team-list" id="historyList"></ul>
      </div>
    </div>
  </div>

  <script src="match-data.js?v=3"></script>
  <script>
    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const t1 = params.get('t1');
      const t2 = params.get('t2');
      const dateStr = params.get('date');
      
      if (!t1 || !t2) {
        document.getElementById('matchTitle').innerText = "Data Not Available";
      } else {
        document.getElementById('matchTitle').innerText = `${t1} vs ${t2}`;
        document.getElementById('matchDate').innerText = dateStr;
        
        const intel = getMatchIntelligence(t1, t2);
        
        // Populate Venue
        document.getElementById('venueName').innerText = intel.venue.name;
        document.getElementById('venueAvg').innerText = intel.venue.avg;
        
        let badges = `<span class="pitch-badge">${intel.venue.type}</span>`;
        badges += `<span class="pitch-badge ${intel.venue.paceOrSpin === 'Pacers' ? 'pace' : 'spin'}">${intel.venue.paceOrSpin} Favored</span>`;
        badges += `<span class="pitch-badge">${intel.venue.batOrBowl} Pitch</span>`;
        if (intel.venue.size) {
          badges += `<span class="pitch-badge" style="border-color: rgba(255,255,255,0.4); color: #FFF;">📐 ${intel.venue.size}</span>`;
        }
        document.getElementById('pitchBadges').innerHTML = badges;
        
        // Populate Squads
        document.getElementById('team1Name').innerText = t1;
        document.getElementById('team2Name').innerText = t2;
        
        document.getElementById('team1List').innerHTML = intel.team1Squad.map(p => `<li>${p}</li>`).join('');
        document.getElementById('team2List').innerHTML = intel.team2Squad.map(p => `<li>${p}</li>`).join('');
        
        // Populate History
        let historyHtml = '';
        intel.historyT1.forEach(h => historyHtml += `<li><strong style="color:#FFF; width: 140px; display:inline-block;">${h.player} (${t1}):</strong> ${h.stat}</li>`);
        intel.historyT2.forEach(h => historyHtml += `<li><strong style="color:#FFF; width: 140px; display:inline-block;">${h.player} (${t2}):</strong> ${h.stat}</li>`);
        if(!historyHtml) historyHtml = `<li>No deep data found for this specific venue matchup</li>`;
        document.getElementById('historyList').innerHTML = historyHtml;
      }
    };
  </script>
</body>
</html>
