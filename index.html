<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IPL 2026 Profit Tracker ✨</title>
  <meta name="description" content="Track your IPL 2026 betting profits and losses with a sleek Apple-style dashboard.">
  <link rel="stylesheet" href="style.css?v=2">
  
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/54/54481.png" type="image/png">
</head>
<body>
  <!-- Ambient Background Orbs -->
  <div class="ambient-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Top Action Row -->
  <div class="action-row">
    <h2>IPL 2026 Tracker</h2>
    <button class="reset-btn" onclick="clearAllData()">Reset Data</button>
  </div>

  <!-- iOS Finance Dashboard Overview -->
  <header class="dashboard glass-panel">
    <div class="wallet-input-container" style="display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; padding-bottom: 30px; border-bottom: 1px solid var(--glass-border);">
      <div class="stat-label">Initial Wallet Deduction</div>
      <div class="input-container" style="max-width: 250px; width: 100%; margin-bottom: 0; margin-top: 10px;">
        <input type="number" id="baseWallet" class="glass-input" placeholder="₹0" style="text-align: center; font-weight: 800; font-size: 24px; padding: 12px; color: var(--danger);" oninput="updateWallet()">
      </div>
    </div>

    <div class="stats-container">
      <div class="stat-box">
        <div class="stat-label">Total Net P/L</div>
        <div class="stat-value" id="totalProfit">₹0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Plays</div>
        <div class="stat-value" id="matchesBet">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value" id="winRate">0%</div>
      </div>
    </div>

    <!-- Team Analytics MVP -->
    <div class="stats-container team-analytics" style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--glass-border);">
      <div class="stat-box">
        <div class="stat-label">🏆 Goldmine</div>
        <div class="stat-value" style="font-size: 26px;" id="goldmineTeam">-</div>
        <div class="stat-label" style="font-size: 12px; margin-top: 4px; color: var(--success); font-weight: 800;" id="goldmineProfit">+₹0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label" style="color: var(--danger);">📉 Money Sink</div>
        <div class="stat-value" style="font-size: 26px;" id="sinkTeam">-</div>
        <div class="stat-label" style="font-size: 12px; margin-top: 4px; color: var(--danger); font-weight: 800;" id="sinkLoss">-₹0</div>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="recent-activity-container" style="margin-top: 40px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
      <div class="stat-label" style="text-align: left; margin-bottom: 20px; font-size: 14px; letter-spacing: 2px;">Recent Betting Activity</div>
      <div id="recentActivityList" class="recent-activity-list">
        <!-- populated by JS -->
      </div>
    </div>
  </header>

  <main>
    <!-- View Switcher (Upcoming / Completed) -->
    <div class="view-tabs" id="viewTabs"></div>

    <!-- Filter bar -->
    <div class="filters" id="filters"></div>

    <!-- Match Grid -->
    <div class="matches-grid" id="matches"></div>

    <!-- Pagination Controls -->
    <div class="pagination" id="pagination"></div>
  </main>

  <!-- Global Toast Notifications Container -->
  <div id="toast-container"></div>

  <!-- Floating Calculator -->
  <div class="fab-container">
    <button class="fab glass-panel" onclick="toggleCalculator()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
        <line x1="8" y1="6" x2="16" y2="6"></line>
        <line x1="16" y1="14" x2="16" y2="18"></line>
        <line x1="16" y1="10" x2="16" y2="10"></line>
        <line x1="8" y1="10" x2="8" y2="10"></line>
        <line x1="12" y1="10" x2="12" y2="10"></line>
        <line x1="8" y1="14" x2="8" y2="14"></line>
        <line x1="12" y1="14" x2="12" y2="14"></line>
        <line x1="8" y1="18" x2="8" y2="18"></line>
        <line x1="12" y1="18" x2="12" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="calculator-modal glass-panel" id="calcModal">
    <div class="calc-header">
      <span>Profit Calculator</span>
      <button class="calc-close" onclick="toggleCalculator()">&times;</button>
    </div>
    
    <div class="betting-calc-body">
      <div class="input-container">
        <div class="stat-label" style="color: var(--text-secondary); margin-bottom: 5px;">Stake (₹)</div>
        <input type="number" id="bcStake" class="glass-input bc-input" placeholder="e.g. 1000" oninput="calcBettingReturn()">
      </div>
      
      <div class="input-container">
        <div class="stat-label" style="color: var(--text-secondary); margin-bottom: 5px;">Match Odds (Decimal)</div>
        <input type="number" id="bcOdds" class="glass-input bc-input" placeholder="e.g. 1.85" step="0.01" oninput="calcBettingReturn()">
      </div>

      <div class="bcalc-results">
        <div class="bcalc-row">
          <span>Return</span>
          <span id="bcReturn">₹0.00</span>
        </div>
        <div class="bcalc-row">
          <span>Net Profit</span>
          <span id="bcProfit" class="profit-highlight">₹0.00</span>
        </div>
      </div>
      
      <button class="save-action" onclick="toggleCalculator()" style="margin-top: 15px;">Close</button>
    </div>
  </div>

  <script src="script.js?v=2"></script>
</body>
</html>
